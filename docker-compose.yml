services:
  app:
    build: .
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      TRUST_PROXY: 1
      CACHE_TTL_MS: 300000
      RATE_LIMIT_MAX: 30
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
